name: Deploy WIP to doc.akka.io/snapshots/
on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths:
      - 'docs/**'

permissions:
  contents: read

jobs:
  build:
    name: scp to Gustav
    runs-on: Akka-Default
    if: github.event.repository.fork == false
    steps:
      - name: Checkout Global Scripts
        uses: actions/checkout@v6
        with:
          repository: akka/github-actions-scripts
          path: scripts
          fetch-depth: 0

      - name: Setup global resolver
        run: |
          chmod +x ./scripts/setup_global_resolver.sh
          ./scripts/setup_global_resolver.sh

      - name: Checkout
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@v6
        with:
          fetch-tags: true # required for version.sh
          # we don't know what commit the last tag was, it's safer to get entire repo
          fetch-depth: 0

      - name: Coursier cache
        # https://github.com/coursier/cache-action/releases
        uses: coursier/cache-action@v8.1.0

      - name: Set up JDK 21
        # https://github.com/coursier/setup-action/releases
        uses: coursier/setup-action@v3.0.0
        with:
          jvm: temurin:1.21

      - name: Downloads, Antora
        run: |
          make managed local

      - name: LLM friendly markdown
        run: |
          sudo ./docs/bin/docs2markdown.sh

      - name: rsync
        run: |
          ./docs/bin/rsync-docs.sh "target/site/*" akkarepo@gustav.akka.io:www/snapshots/akka-documentation/
        env:
          SCP_SECRET: ${{ secrets.AKKA_RSYNC_GUSTAV }}

      - name: llm-ctx.txt
        run: |
          sudo chmod a+w target/site
          # https://github.com/AnswerDotAI/llms-txt/issues/103
          pip install fastcore==1.12.1
          pip install llms-txt
          sudo cp docs/src/modules/ROOT/pages/llms.txt target/site/
          llms_txt2ctx target/site/llms.txt > target/site/llms-ctx.txt
          llms_txt2ctx target/site/llms.txt --optional true > target/site/llms-ctx-full.txt
          ./docs/bin/rsync-docs.sh "target/site/llms*.txt" akkarepo@gustav.akka.io:www/snapshots/akka-documentation/
        env:
          SCP_SECRET: ${{ secrets.AKKA_RSYNC_GUSTAV }}
